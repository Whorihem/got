<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة العروش | جميع المواسم</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
    
    body {
      font-family: 'Tajawal', sans-serif;
      background-color: #0a0a12;
      color: white;
    }
    
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      background-color: #000;
    }
    
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 0.5rem;
    }
    
    .episode-item {
      transition: all 0.3s;
      border-right: 3px solid transparent;
      background-color: #141428;
    }
    
    .episode-item:hover {
      background-color: #1f1f40;
      transform: translateX(-5px);
    }
    
    .episode-item.current-episode {
      background-color: #1a1a2e;
      border-right-color: #4169e1;
    }
    
    .episode-thumbnail {
      width: 140px;
      height: 80px;
      object-fit: cover;
      border-radius: 0.25rem;
      margin-left: 1rem;
    }
    
    .season-dropdown {
      display: none;
      position: absolute;
      background-color: #1a1a2e;
      min-width: 200px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      z-index: 50;
      right: 0;
      border-radius: 0.5rem;
      border: 1px solid #2a3a6a;
    }
    
    .season-dropdown.show {
      display: block;
    }
    
    .season-dropdown a {
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      border-bottom: 1px solid #2a3a6a;
      cursor: pointer;
    }
    
    .season-dropdown a:hover {
      background-color: #4169e1;
    }
    
    .season-btn {
      background-color: #1a1a2e;
      border: 1px solid #4169e1;
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s;
    }
    
    .season-btn:hover {
      background-color: #4169e1;
    }
    
    .age-rating {
      background-color: #eed740;
      color: black;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
    }
    
    .nav-button {
      background-color: #1a1a2e;
      color: white;
      border: 1px solid #edf05d;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      transition: all 0.3s;
    }
    
    .nav-button:hover {
      background-color: #4169e1;
      border-color: #4169e1;
    }
    
    .info-section {
      background: linear-gradient(145deg, #141428 0%, #0f0f20 100%);
      border-radius: 1rem;
      padding: 1.5rem;
      margin: 1rem 0;
    }
    
    .episode-badge {
      background-color: #4169e1;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body class="text-white">

    };

  
    // المتغيرات العامة
    let currentUserId = localStorage.getItem("currentUserId") || 'guest';
    let currentSeason = parseInt(localStorage.getItem(`lastWatchedSeason_${currentUserId}`)) || 1;
    let currentEpisode = parseInt(localStorage.getItem(`lastWatchedEpisodeId_${currentUserId}`)) || null;

    // تهيئة القائمة المنسدلة للمواسم
    function initializeSeasonDropdown() {
      const dropdown = document.getElementById("seasonDropdown");
      dropdown.innerHTML = "";
      
      Object.keys(seasons).forEach(seasonNum => {
        const season = seasons[seasonNum];
        const item = document.createElement("a");
        item.textContent = season.title;
        item.onclick = (e) => {
          e.preventDefault();
          e.stopPropagation();
          loadSeason(parseInt(seasonNum));
          dropdown.classList.remove("show");
        };
        dropdown.appendChild(item);
      });
    }

    // عرض معلومات الموسم
    function showSeasonInfo() {
      const season = seasons[currentSeason];
      document.getElementById("seasonTitle").textContent = season.title;
      document.getElementById("seasonMeta").textContent = `${season.episodes.length} حلقات | مغامرات، فانتازيا`;
      document.getElementById("seasonBio").textContent = season.bio;
      document.getElementById("episodesCount").textContent = `${season.episodes.length} حلقة`;
      
      document.getElementById("seasonInfo").classList.remove("hidden");
      document.getElementById("episodeInfo").classList.add("hidden");
    }

    // عرض معلومات الحلقة
    function showEpisodeInfo(episode) {
      document.getElementById("episodeTitle").textContent = episode.title;
      document.getElementById("episodeRating").textContent = episode.rating;
      document.getElementById("episodeDescription").textContent = episode.description || 'لا يوجد وصف متاح';
      
      document.getElementById("seasonInfo").classList.add("hidden");
      document.getElementById("episodeInfo").classList.remove("hidden");
    }

    // عرض قائمة الحلقات
    function renderEpisodes() {
      const list = document.getElementById("episodesList");
      list.innerHTML = "";
      const episodes = seasons[currentSeason].episodes;

      episodes.forEach(ep => {
        const div = document.createElement("div");
        div.className = `episode-item flex items-center p-3 rounded cursor-pointer mb-2 ${ep.id === currentEpisode ? 'current-episode' : ''}`;
        div.setAttribute('data-episode-id', ep.id);
        
        div.innerHTML = `
          <img src="${ep.thumbnail || 'https://via.placeholder.com/140x80?text=صورة'}" class="episode-thumbnail" loading="lazy" onerror="this.src='https://via.placeholder.com/140x80?text=صورة'">
          <div class="flex-1 mr-3">
            <h3 class="font-bold text-lg">${ep.title}</h3>
            <p class="text-sm text-gray-400 mt-1">${ep.rating}</p>
          </div>
          ${ep.id === currentEpisode ? '<span class="bg-blue-600 text-xs px-3 py-1 rounded-full">مشاهَد</span>' : ''}
        `;
        
        div.onclick = () => loadEpisode(ep.id);
        list.appendChild(div);
      });
    }

    // تحميل حلقة
    function loadEpisode(episodeId) {
      const episode = seasons[currentSeason].episodes.find(e => e.id === episodeId);
      if (!episode) return;

      currentEpisode = episodeId;

      document.getElementById("episodePlayer").classList.remove("hidden");
      document.getElementById("episodeNav").classList.remove("hidden");
      document.getElementById("mainVideo").src = episode.videoUrl;

      showEpisodeInfo(episode);

      document.querySelectorAll(".episode-item").forEach(item => {
        item.classList.remove("current-episode");
        const badge = item.querySelector('.bg-blue-600');
        if (badge) badge.remove();
      });
      
      const currentItem = document.querySelector(`.episode-item[data-episode-id="${episodeId}"]`);
      if (currentItem) {
        currentItem.classList.add("current-episode");
        
        const badge = document.createElement('span');
        badge.className = 'bg-blue-600 text-xs px-3 py-1 rounded-full';
        badge.textContent = 'مشاهَد';
        currentItem.querySelector('.flex-1').after(badge);
      }

      // حفظ في localStorage (تم التصحيح: currentEpisode بدلاً من currentEpisodeId)
      localStorage.setItem(`lastWatchedSeason_${currentUserId}`, currentSeason);
      localStorage.setItem(`lastWatchedEpisodeId_${currentUserId}`, currentEpisode);
      
      saveToWatchHistory(episode);

      setTimeout(() => {
        document.getElementById("episodePlayer").scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }

    // دالة حفظ المشاهدات العامة (لصفحة الرئيسية)
    function saveToGlobalWatchedEpisodes(episode) {
      const globalWatched = JSON.parse(localStorage.getItem(`watchedEpisodes_${currentUserId}`) || '[]');
      
      const episodeData = {
        id: episode.id,
        title: episode.title,
        season: currentSeason,
        series: 'Game of Thrones',
        seriesTitle: 'لعبة العروش',
        thumbnail: episode.thumbnail || '',
        watchedAt: new Date().toISOString()
      };
      
      const filtered = globalWatched.filter(ep => 
        !(ep.id === episode.id && ep.series === 'Game of Thrones' && ep.season === currentSeason)
      );
      
      filtered.unshift(episodeData);
      const limited = filtered.slice(0, 30);
      
      localStorage.setItem(`watchedEpisodes_${currentUserId}`, JSON.stringify(limited));
      console.log('تم حفظ الحلقة في المشاهدات العامة:', episode.title);
    }

    // حفظ في سجل المشاهدة
    function saveToWatchHistory(episode) {
      const historyKey = `watchedEpisodes_s${currentSeason}_${currentUserId}`;
      let history = JSON.parse(localStorage.getItem(historyKey) || '[]');
      
      history = history.filter(ep => ep.id !== episode.id);
      
      history.unshift({
        id: episode.id,
        title: episode.title,
        season: currentSeason,
        watchedAt: new Date().toISOString()
      });
      
      if (history.length > 10) history = history.slice(0, 10);
      
      localStorage.setItem(historyKey, JSON.stringify(history));
      
      saveToGlobalWatchedEpisodes(episode);
    }

    // تحميل الموسم
    function loadSeason(seasonNumber) {
      currentSeason = seasonNumber;
      currentEpisode = null;

      document.getElementById("seasonBtnText").textContent = seasons[seasonNumber].title;
      showSeasonInfo();

      document.getElementById("episodePlayer").classList.add("hidden");
      document.getElementById("episodeNav").classList.add("hidden");

      renderEpisodes();

      const savedEpisode = localStorage.getItem(`lastWatchedEpisodeId_${currentUserId}`);
      const savedSeason = localStorage.getItem(`lastWatchedSeason_${currentUserId}`);
      
      if (savedEpisode && savedSeason && parseInt(savedSeason) === seasonNumber) {
        loadEpisode(parseInt(savedEpisode));
      } else {
        document.getElementById("episodePlayer").classList.add("hidden");
        document.getElementById("episodeNav").classList.add("hidden");
      }
    }

    // التنقل بين الحلقات
    function nextEpisode() {
      if (!currentEpisode) return;
      
      const episodes = seasons[currentSeason].episodes;
      const currentIndex = episodes.findIndex(ep => ep.id === currentEpisode);
      
      if (currentIndex < episodes.length - 1) {
        loadEpisode(episodes[currentIndex + 1].id);
      }
    }

    function prevEpisode() {
      if (!currentEpisode) return;
      
      const episodes = seasons[currentSeason].episodes;
      const currentIndex = episodes.findIndex(ep => ep.id === currentEpisode);
      
      if (currentIndex > 0) {
        loadEpisode(episodes[currentIndex - 1].id);
      }
    }

    // أحداث النقر
    document.addEventListener("DOMContentLoaded", () => {
      initializeSeasonDropdown();

      const seasonBtn = document.getElementById("seasonBtn");
      const seasonDropdown = document.getElementById("seasonDropdown");

      seasonBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        seasonDropdown.classList.toggle("show");
      });

      window.addEventListener("click", () => {
        seasonDropdown.classList.remove("show");
      });

      document.getElementById("nextEpisodeBtn").addEventListener("click", nextEpisode);
      document.getElementById("prevEpisodeBtn").addEventListener("click", prevEpisode);

      loadSeason(currentSeason);
    });

    // دالة تغيير المستخدم
    function setCurrentUser(userId) {
      currentUserId = userId;
      localStorage.setItem("currentUserId", userId);
      
      currentSeason = parseInt(localStorage.getItem(`lastWatchedSeason_${currentUserId}`)) || 1;
      currentEpisode = parseInt(localStorage.getItem(`lastWatchedEpisodeId_${currentUserId}`)) || null;
      
      loadSeason(currentSeason);
    }

    // دالة تسجيل الخروج
    function logout() {
      setCurrentUser('guest');
    }

  </script>
