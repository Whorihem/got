<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عودة الممالك - بوابة الدخول</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      font-family: 'Tajawal', sans-serif;
    }
    
    body {
      background-image: url('https://i.postimg.cc/MZN1wmpb/05663b1e889301de09f7072c5ae80a09-1.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      position: relative;
    }
    
    /* طبقة داكنة فوق الخلفية */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(10,10,20,0.85) 0%, rgba(26,26,46,0.9) 100%);
      z-index: 0;
    }
    
    /* تأثير الجسيمات المتحركة */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
    }
    
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,215,0,0.3);
      border-radius: 50%;
      animation: float 15s infinite linear;
    }
    
    @keyframes float {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100px) translateX(100px);
        opacity: 0;
      }
    }
    
    /* تأثير التوهج */
    .glow-effect {
      position: relative;
    }
    
    .glow-effect::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #ffd700, #ffaa00, #ffd700);
      border-radius: inherit;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .glow-effect:hover::after {
      opacity: 0.5;
    }
    
    /* بطاقة الدخول */
    .login-card {
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 215, 0, 0.2);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.1);
      transition: all 0.3s ease;
      position: relative;
      z-index: 10;
    }
    
    .login-card:hover {
      border-color: rgba(255, 215, 0, 0.4);
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), 0 0 50px rgba(255, 215, 0, 0.2);
    }
    
    /* التاج المتحرك */
    .crown-animation {
      animation: crownGlow 2s infinite alternate;
    }
    
    @keyframes crownGlow {
      0% {
        filter: drop-shadow(0 0 5px rgba(255,215,0,0.5));
        transform: scale(1);
      }
      100% {
        filter: drop-shadow(0 0 20px rgba(255,215,0,0.8));
        transform: scale(1.05);
      }
    }
    
    /* النص المتوهج */
    .glow-text {
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
      animation: textPulse 3s infinite;
    }
    
    @keyframes textPulse {
      0%, 100% {
        text-shadow: 0 0 10px rgba(255,215,0,0.5);
      }
      50% {
        text-shadow: 0 0 20px rgba(255,215,0,0.8);
      }
    }
    
    /* زر جوجل المخصص */
    .google-btn {
      background: linear-gradient(135deg, #1a1a2e 0%, #2a2a40 100%);
      border: 1px solid rgba(255,215,0,0.3);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .google-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .google-btn:hover::before {
      left: 100%;
    }
    
    .google-btn:hover {
      border-color: #ffd700;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(255,215,0,0.3);
    }
    
    .google-btn:active {
      transform: translateY(0);
    }
    
    .google-btn.loading {
      pointer-events: none;
      opacity: 0.8;
    }
    
    /* مؤشر التحميل */
    .loader {
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #ffd700;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-left: 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* خطوط زخرفية */
    .decorative-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, #ffd700, transparent);
      width: 100%;
      margin: 20px 0;
    }
    
    /* تأثير الكتابة */
    .typing-effect {
      border-left: 2px solid #ffd700;
      padding-right: 10px;
      animation: blink 1s infinite;
    }
    
    @keyframes blink {
      0%, 100% { border-color: transparent; }
      50% { border-color: #ffd700; }
    }
    
    /* الشعار */
    .logo-icon {
      animation: crownFloat 3s ease-in-out infinite;
    }
    
    @keyframes crownFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    /* شريط التقدم */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      transition: width 0.3s ease;
      z-index: 9999;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  
  <!-- شريط التقدم -->
  <div id="progressBar" class="progress-bar"></div>
  
  <!-- الجسيمات المتحركة -->
  <div class="particles" id="particles"></div>
  
  <!-- بطاقة الدخول الرئيسية -->
  <div class="login-card rounded-3xl p-8 md:p-10 max-w-md w-full text-center relative overflow-hidden">
    
    <!-- الزخارف العلوية -->
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-yellow-500 to-transparent"></div>
    <div class="absolute top-0 right-0 w-1 h-20 bg-gradient-to-b from-yellow-500 to-transparent"></div>
    <div class="absolute top-0 left-0 w-1 h-20 bg-gradient-to-b from-yellow-500 to-transparent"></div>
    
    <!-- أيقونة التاج -->
    <div class="mb-6 relative">
      <div class="w-24 h-24 mx-auto bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-full flex items-center justify-center crown-animation">
        <i class="fas fa-crown text-black text-4xl logo-icon"></i>
      </div>
      <div class="absolute inset-0 bg-yellow-500 rounded-full filter blur-xl opacity-30 animate-pulse"></div>
    </div>
    
    <!-- العنوان -->
    <h1 class="text-4xl md:text-5xl font-black mb-3 glow-text">عودة الممالك</h1>
    
    <!-- الخط الزخرفي -->
    <div class="decorative-line"></div>
    
    <!-- الترحيب -->
    <div class="mb-8">
      <p class="text-xl text-gray-200 mb-2">مرحباً بك في عوالم ويستروس</p>
      <p class="text-gray-400 flex items-center justify-center gap-2">
        <i class="fas fa-dragon text-yellow-500"></i>
        <span id="typingText" class="typing-effect">سجّل دخولك للعبور</span>
        <i class="fas fa-dragon text-yellow-500"></i>
      </p>
    </div>
    
    <!-- قائمة الممالك -->
    <div class="grid grid-cols-3 gap-2 mb-8">
      <div class="bg-black/30 rounded-lg p-2 border border-yellow-500/20">
        <i class="fas fa-crown text-yellow-500 text-lg"></i>
        <p class="text-xs text-white mt-1">الشمال</p>
      </div>
      <div class="bg-black/30 rounded-lg p-2 border border-yellow-500/20">
        <i class="fas fa-lion text-yellow-500 text-lg"></i>
        <p class="text-xs text-white mt-1">لانستر</p>
      </div>
      <div class="bg-black/30 rounded-lg p-2 border border-yellow-500/20">
        <i class="fas fa-dragon text-yellow-500 text-lg"></i>
        <p class="text-xs text-white mt-1">تارجيريان</p>
      </div>
    </div>
    
    <!-- زر تسجيل الدخول -->
    <button id="loginBtn" onclick="authenticate()" 
      class="google-btn w-full py-4 px-6 rounded-xl text-white font-bold text-lg mb-6 flex items-center justify-center gap-3 group">
      <i class="fab fa-google text-2xl group-hover:scale-110 transition"></i>
      <span>تسجيل الدخول باستخدام Google</span>
    </button>
    
    <!-- معلومات الأمان -->
    <div class="flex items-center justify-center gap-2 text-xs text-gray-400 mb-4">
      <i class="fas fa-shield-alt text-yellow-500"></i>
      <span>بياناتك آمنة ومشفرة</span>
      <i class="fas fa-shield-alt text-yellow-500"></i>
    </div>
    
    <!-- الخط الزخرفي السفلي -->
    <div class="decorative-line !mt-4"></div>
    
    <!-- التذييل -->
    <div class="mt-6 text-gray-400 text-sm">
      <p>© 2025 - جميع الحقوق محفوظة لـ <span class="text-yellow-500 font-bold">ريهام</span></p>
      <p class="text-xs mt-2 opacity-50">"الشتاء قادم و مسلسلات اخرى قادمة أيضا" ❄️</p>
    </div>
    
    <!-- الزخارف السفلية -->
    <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-yellow-500 to-transparent"></div>
    <div class="absolute bottom-0 right-0 w-1 h-20 bg-gradient-to-t from-yellow-500 to-transparent"></div>
    <div class="absolute bottom-0 left-0 w-1 h-20 bg-gradient-to-t from-yellow-500 to-transparent"></div>
  </div>

  <script>
    const CLIENT_ID = "979672261230-eq200v1cpuk19nbgb2hfm5amoggv460b.apps.googleusercontent.com";
    const SCOPES = "https://www.googleapis.com/auth/userinfo.profile email";
    const TOKEN_KEY = "google_access_token";
    const LOGIN_STATUS_KEY = "user_logged_in";

    // عناصر الصفحة
    const loginBtn = document.getElementById('loginBtn');
    const progressBar = document.getElementById('progressBar');
    const typingText = document.getElementById('typingText');

    // إنشاء الجسيمات المتحركة
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      const particleCount = 50;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.width = Math.random() * 3 + 1 + 'px';
        particle.style.height = particle.style.width;
        particle.style.background = `rgba(255, 215, 0, ${Math.random() * 0.5})`;
        particlesContainer.appendChild(particle);
      }
    }

    // تحديث شريط التقدم
    function updateProgress(percentage) {
      progressBar.style.width = percentage + '%';
    }

    // تأثير الكتابة المتحركة
    function typeWriter() {
      const texts = [
        "سجّل دخولك للعبور",
        "العرش الحديدي ينتظرك",
        "انضم إلى الممالك السبع",
        "مغامرتك تبدأ هنا"
      ];
      let textIndex = 0;
      let charIndex = 0;
      
      setInterval(() => {
        if (charIndex < texts[textIndex].length) {
          typingText.textContent = texts[textIndex].substring(0, charIndex + 1);
          charIndex++;
        } else {
          charIndex = 0;
          textIndex = (textIndex + 1) % texts.length;
        }
      }, 100);
    }

    // عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', function() {
      createParticles();
      typeWriter();
      updateProgress(100);
      setTimeout(() => updateProgress(0), 200);
      
      const isLoggedIn = localStorage.getItem(LOGIN_STATUS_KEY);
      const savedToken = localStorage.getItem(TOKEN_KEY);
      
      if (isLoggedIn === "true" && savedToken) {
        redirectToHome();
      }
    });

    // تحديث شريط التقدم عند التمرير
    window.addEventListener('scroll', () => {
      const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const scrolled = (winScroll / height) * 100;
      updateProgress(scrolled);
    });

    // دالة المصادقة
    function authenticate() {
      // تغيير حالة الزر
      loginBtn.classList.add('loading');
      loginBtn.innerHTML = `
        <div class="loader"></div>
        <span>جاري التحضير...</span>
      `;
      
      // تحديث شريط التقدم
      updateProgress(30);
      
      google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (tokenResponse) => {
          updateProgress(70);
          
          if (tokenResponse && tokenResponse.access_token) {
            // حفظ رمز الوصول
            localStorage.setItem(TOKEN_KEY, tokenResponse.access_token);
            
            // جلب بيانات المستخدم من Google
            fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
              headers: {
                'Authorization': `Bearer ${tokenResponse.access_token}`
              }
            })
            .then(response => response.json())
            .then(userData => {
              // حفظ بيانات المستخدم
              const userEmail = userData.email;
              const userName = userData.name;
              const userAvatar = userData.picture;
              const userId = userEmail.split('@')[0]; // استخدام البريد كمعرف فريد
              
              localStorage.setItem(LOGIN_STATUS_KEY, "true");
              localStorage.setItem("user_email", userEmail);
              localStorage.setItem("user_name", userName);
              localStorage.setItem("user_avatar", userAvatar);
              localStorage.setItem("currentUserId", userId); // ✅ مهم جداً
              
              // إنشاء سجل للمستخدم الجديد إذا لم يكن موجوداً
              if (!localStorage.getItem(`joinDate_${userId}`)) {
                localStorage.setItem(`joinDate_${userId}`, new Date().toISOString().split('T')[0]);
              }
              
              console.log('تم تسجيل الدخول:', userName, userEmail);
              
              updateProgress(100);
              
              // تأخير بسيط للانتقال
              setTimeout(() => {
                redirectToHome();
              }, 500);
            })
            .catch(error => {
              console.error('خطأ في جلب بيانات المستخدم:', error);
              // حتى لو فشل جلب البيانات، نكمل تسجيل الدخول
              localStorage.setItem(LOGIN_STATUS_KEY, "true");
              localStorage.setItem("currentUserId", "user_" + Date.now());
              updateProgress(100);
              setTimeout(() => redirectToHome(), 500);
            });
            
          } else {
            handleError('حدث خطأ أثناء التسجيل');
          }
        },
        error_callback: (error) => {
          handleError('خطأ في المصادقة: ' + error.message);
        }
      }).requestAccessToken();
    }

    function handleError(message) {
      console.error(message);
      loginBtn.classList.remove('loading');
      loginBtn.innerHTML = `
        <i class="fab fa-google text-2xl"></i>
        <span>تسجيل الدخول باستخدام Google</span>
      `;
      updateProgress(0);
      alert(message);
    }

    function redirectToHome() {
      window.location.href = "home.html";
    }

    // دالة تسجيل الخروج
    function logout() {
      // تأثير الخروج
      document.body.style.opacity = '0';
      document.body.style.transition = 'opacity 0.5s ease';
      
      setTimeout(() => {
        localStorage.removeItem(LOGIN_STATUS_KEY);
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem("user_email");
        localStorage.removeItem("user_name");
        localStorage.removeItem("user_avatar");
        // ملاحظة: لا نقوم بإزالة currentUserId هنا لأننا نريد الاحتفاظ ببيانات المستخدم
        window.location.href = "index.html";
      }, 500);
    }

    // إضافة تأثيرات hover للبطاقة
    document.querySelector('.login-card').addEventListener('mousemove', (e) => {
      const rect = e.target.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const xPercent = (x / rect.width - 0.5) * 20;
      const yPercent = (y / rect.height - 0.5) * 20;
      
      e.target.style.transform = `perspective(1000px) rotateY(${xPercent}deg) rotateX(${-yPercent}deg)`;
    });

    document.querySelector('.login-card').addEventListener('mouseleave', (e) => {
      e.target.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg)';
    });
</script>
</body>
</html>
