<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سبارتاكوس | جميع المواسم</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
    
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #2d1a1a 0%, #4a2b2b 100%);
      color: white;
    }
    
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      background-color: #000;
    }
    
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 0.5rem;
    }
    
    .episode-item {
      transition: all 0.3s;
      border-right: 3px solid transparent;
      background-color: #2d1a1a;
    }
    
    .episode-item:hover {
      background-color: #4a2b2b;
      transform: translateX(-5px);
    }
    
    .episode-item.current-episode {
      background-color: #6b3f3f;
      border-right-color: #b8860b;
    }
    
    .episode-thumbnail {
      width: 140px;
      height: 80px;
      object-fit: cover;
      border-radius: 0.25rem;
      margin-left: 1rem;
    }
    
    .season-dropdown {
      display: none;
      position: absolute;
      background-color: #2d1a1a;
      min-width: 200px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      z-index: 50;
      right: 0;
      border-radius: 0.5rem;
      border: 1px solid #b8860b;
    }
    
    .season-dropdown.show {
      display: block;
    }
    
    .season-dropdown a {
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      border-bottom: 1px solid #b8860b;
      cursor: pointer;
    }
    
    .season-dropdown a:hover {
      background-color: #b8860b;
      color: black;
    }
    
    .season-btn {
      background-color: #2d1a1a;
      border: 1px solid #b8860b;
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s;
    }
    
    .season-btn:hover {
      background-color: #b8860b;
      color: black;
    }
    
    .age-rating {
      background-color: #b8860b;
      color: black;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
    }
    
    .nav-button {
      background-color: #2d1a1a;
      color: white;
      border: 1px solid #b8860b;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      transition: all 0.3s;
    }
    
    .nav-button:hover {
      background-color: #b8860b;
      color: black;
      border-color: #b8860b;
    }
    
    .info-section {
      background: linear-gradient(145deg, #2d1a1a 0%, #1f1212 100%);
      border-radius: 1rem;
      padding: 1.5rem;
      margin: 1rem 0;
      border: 1px solid #b8860b33;
    }
    
    .episode-badge {
      background-color: #b8860b;
      color: black;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body class="text-white">

  <div class="container max-w-6xl mx-auto px-4 py-6">
    <!-- رأس الصفحة مع زر الموسم -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-8">

        </div>

    <!-- مشغل الحلقات -->

        <iframe id="mainVideo" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>

    <!-- منطقة المعلومات (تتبدل بين الموسم والحلقة) -->
    <div id="infoArea" class="info-section">
      <!-- معلومات الموسم (تظهر افتراضياً) -->
      <div id="seasonInfo">
        <div class="flex items-center gap-3 mb-3">
          <h2 id="seasonTitle" class="text-2xl font-bold"></h2>
          <span class="age-rating">بدون لقطات</span>
        </div>
        <p id="seasonMeta" class="text-gray-300 text-lg mb-3"></p>
        <p id="seasonBio" class="text-gray-400 leading-relaxed"></p>
      </div>
      
      <!-- معلومات الحلقة (تظهر عند التشغيل) -->
      <div id="episodeInfo" class="hidden">
        <div class="flex items-center gap-3 mb-3">
          <h2 id="episodeTitle" class="text-2xl font-bold"></h2>
          <span class="episode-badge">الحلقة الحالية</span>
        </div>
        <p id="episodeRating" class="text-yellow-400 text-xl font-bold mb-3"></p>
        <p id="episodeDescription" class="text-gray-400 leading-relaxed"></p>
      </div>
    </div>

    <!-- أزرار التنقل بين الحلقات -->
    <div id="episodeNav" class="flex justify-between items-center mb-6 hidden">
      <button id="prevEpisodeBtn" class="nav-button flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
        </svg>
        الحلقة السابقة
      </button>
      <button id="nextEpisodeBtn" class="nav-button flex items-center gap-2">
        الحلقة التالية
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
        </svg>
      </button>
    </div>

    <!-- قائمة الحلقات -->
    <div class="mt-8">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <span>📺 قائمة الحلقات</span>
        <span id="episodesCount" class="text-sm bg-gray-700 px-3 py-1 rounded-full"></span>
      </h2>
      <div id="episodesList" class="space-y-2"></div>
    </div>

    <!-- زر العودة -->
    <div class="flex justify-center mt-8">
      <a href="home.html">
        <button class="nav-button px-6 py-3">
          ← العودة إلى الصفحة الرئيسية
        </button>
      </a>
    </div>
  </div>

  episodes: [

    { id: 4, title: "الحلقة 4: الشيء الموجود في الحفرة", rating: "IMDB: 8.3/10", description: "بعد أدائه الضعيف في الحلبة، تم إرسال سبارتاكوس إلى الحفرة، وهو مكان للألم والمعاناة.", thumbnail: "https://i0.wp.com/the-avocado.org/wp-content/uploads/2020/02/Spartacus-S01E04.jpg?resize=1659%2C768&ssl=1", videoUrl: "https://drive.google.com/file/d/1milCmWMeLpOTluWkSzRhErDHjaGQVhEu/preview" },
    { id: 5, title: "الحلقة 5: ألعاب الظل", rating: "IMDB: 8.9/10", description: "يواجه سبارتاكوس وكريكسوس مصارعًا عملاقًا لم يُهزم قط. إذا لم يتجاوزا كراهيتهما لبعضهما البعض ويعملا كفريق واحد، فسوف يقتلهما معًا.", thumbnail: "https://s.yimg.com/ny/api/res/1.2/CH5fgV33bpTLWLKVHEiL5Q--/YXBwaWQ9aGlnaGxhbmRlcjt3PTk2MDtoPTU0MDtjZj13ZWJw/https://media.zenfs.com/en/techradar_949/73c5e09c80c726a533dfd24571e246ea", videoUrl: "https://drive.google.com/file/d/1DvfgKz56zPlV5I-rlhMKdzHU9Q9TfwnN/preview" },

    };

    // المتغيرات العامة
    let currentUserId = localStorage.getItem("currentUserId") || 'guest';
    let currentSeason = parseInt(localStorage.getItem(`lastWatchedSeason_${currentUserId}`)) || 1;
    let currentEpisode = parseInt(localStorage.getItem(`lastWatchedEpisodeId_${currentUserId}`)) || null;

    // تهيئة القائمة المنسدلة للمواسم
    function initializeSeasonDropdown() {
      const dropdown = document.getElementById("seasonDropdown");
      dropdown.innerHTML = "";
      
      Object.keys(seasons).forEach(seasonNum => {
        const season = seasons[seasonNum];
        const item = document.createElement("a");
        item.textContent = season.title;
        item.onclick = (e) => {
          e.preventDefault();
          e.stopPropagation();
          loadSeason(parseInt(seasonNum));
          dropdown.classList.remove("show");
        };
        dropdown.appendChild(item);
      });
    }

    // عرض معلومات الموسم
    function showSeasonInfo() {
      const season = seasons[currentSeason];
      document.getElementById("seasonTitle").textContent = season.title;
      document.getElementById("seasonMeta").textContent = `${season.episodes.length} حلقات | أكشن، تاريخي، دراما`;
      document.getElementById("seasonBio").textContent = season.bio;
      document.getElementById("episodesCount").textContent = `${season.episodes.length} حلقة`;
      
      document.getElementById("seasonInfo").classList.remove("hidden");
      document.getElementById("episodeInfo").classList.add("hidden");
    }

    // عرض معلومات الحلقة
    function showEpisodeInfo(episode) {
      document.getElementById("episodeTitle").textContent = episode.title;
      document.getElementById("episodeRating").textContent = episode.rating;
      document.getElementById("episodeDescription").textContent = episode.description || 'لا يوجد وصف متاح';
      
      document.getElementById("seasonInfo").classList.add("hidden");
      document.getElementById("episodeInfo").classList.remove("hidden");
    }

    // عرض قائمة الحلقات
    function renderEpisodes() {
      const list = document.getElementById("episodesList");
      list.innerHTML = "";
      const episodes = seasons[currentSeason].episodes;

      episodes.forEach(ep => {
        const div = document.createElement("div");
        div.className = `episode-item flex items-center p-3 rounded cursor-pointer mb-2 ${ep.id === currentEpisode ? 'current-episode' : ''}`;
        div.setAttribute('data-episode-id', ep.id);
        
        div.innerHTML = `
          <img src="${ep.thumbnail || 'https://via.placeholder.com/140x80?text=سبارتاكوس'}" class="episode-thumbnail" loading="lazy" onerror="this.src='https://via.placeholder.com/140x80?text=سبارتاكوس'">
          <div class="flex-1 mr-3">
            <h3 class="font-bold text-lg">${ep.title}</h3>
            <p class="text-sm text-gray-400 mt-1">${ep.rating}</p>
          </div>
          ${ep.id === currentEpisode ? '<span class="bg-blue-600 text-xs px-3 py-1 rounded-full">مشاهَد</span>' : ''}
        `;
        
        div.onclick = () => loadEpisode(ep.id);
        list.appendChild(div);
      });
    }

    // تحميل حلقة - تم التصحيح هنا
    function loadEpisode(episodeId) {
      const episode = seasons[currentSeason].episodes.find(e => e.id === episodeId);
      if (!episode) return;

      // تحديث currentEpisode
      currentEpisode = episodeId;

      // إظهار المشغل وأزرار التنقل
      document.getElementById("episodePlayer").classList.remove("hidden");
      document.getElementById("episodeNav").classList.remove("hidden");
      
      // تحديث مصدر الفيديو
      document.getElementById("mainVideo").src = episode.videoUrl;

      // عرض معلومات الحلقة
      showEpisodeInfo(episode);

      // تحديث واجهة الحلقات
      document.querySelectorAll(".episode-item").forEach(item => {
        item.classList.remove("current-episode");
        const badge = item.querySelector('.bg-blue-600');
        if (badge) badge.remove();
      });
      
      const currentItem = document.querySelector(`.episode-item[data-episode-id="${episodeId}"]`);
      if (currentItem) {
        currentItem.classList.add("current-episode");
        
        const badge = document.createElement('span');
        badge.className = 'bg-blue-600 text-xs px-3 py-1 rounded-full';
        badge.textContent = 'مشاهَد';
        currentItem.querySelector('.flex-1').after(badge);
      }

      // ✅ تم التصحيح: currentEpisode بدلاً من currentEpisodeId
      localStorage.setItem(`lastWatchedSeason_${currentUserId}`, currentSeason);
      localStorage.setItem(`lastWatchedEpisodeId_${currentUserId}`, currentEpisode);
      
      // حفظ في سجل المشاهدة
      saveToWatchHistory(episode);

      // تمرير إلى المشغل
      setTimeout(() => {
        document.getElementById("episodePlayer").scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
      
      console.log('تم الحفظ:', { user: currentUserId, season: currentSeason, episode: currentEpisode });
    }

    // دالة حفظ المشاهدات العامة
    function saveToGlobalWatchedEpisodes(episode) {
      const globalWatched = JSON.parse(localStorage.getItem(`watchedEpisodes_${currentUserId}`) || '[]');
      
      const episodeData = {
        id: episode.id,
        title: episode.title,
        season: currentSeason,
        series: 'Spartacus',
        seriesTitle: 'سبارتاكوس',
        thumbnail: episode.thumbnail || '',
        watchedAt: new Date().toISOString()
      };
      
      const filtered = globalWatched.filter(ep => 
        !(ep.id === episode.id && ep.series === 'Spartacus' && ep.season === currentSeason)
      );
      
      filtered.unshift(episodeData);
      const limited = filtered.slice(0, 30);
      
      localStorage.setItem(`watchedEpisodes_${currentUserId}`, JSON.stringify(limited));
      console.log('تم حفظ الحلقة في المشاهدات العامة:', episode.title);
    }

    // حفظ في سجل المشاهدة
    function saveToWatchHistory(episode) {
      const historyKey = `watchedEpisodes_s${currentSeason}_${currentUserId}`;
      let history = JSON.parse(localStorage.getItem(historyKey) || '[]');
      
      history = history.filter(ep => ep.id !== episode.id);
      
      history.unshift({
        id: episode.id,
        title: episode.title,
        season: currentSeason,
        watchedAt: new Date().toISOString()
      });
      
      if (history.length > 10) history = history.slice(0, 10);
      
      localStorage.setItem(historyKey, JSON.stringify(history));
      
      saveToGlobalWatchedEpisodes(episode);
    }

    // تحميل الموسم
    function loadSeason(seasonNumber) {
      currentSeason = seasonNumber;
      currentEpisode = null;

      document.getElementById("seasonBtnText").textContent = seasons[seasonNumber].title;

      showSeasonInfo();

      document.getElementById("episodePlayer").classList.add("hidden");
      document.getElementById("episodeNav").classList.add("hidden");

      renderEpisodes();

      const savedEpisode = localStorage.getItem(`lastWatchedEpisodeId_${currentUserId}`);
      const savedSeason = localStorage.getItem(`lastWatchedSeason_${currentUserId}`);
      
      if (savedEpisode && savedSeason && parseInt(savedSeason) === seasonNumber) {
        loadEpisode(parseInt(savedEpisode));
      } else {
        document.getElementById("episodePlayer").classList.add("hidden");
        document.getElementById("episodeNav").classList.add("hidden");
      }
    }

    // التنقل بين الحلقات
    function nextEpisode() {
      if (!currentEpisode) return;
      
      const episodes = seasons[currentSeason].episodes;
      const currentIndex = episodes.findIndex(ep => ep.id === currentEpisode);
      
      if (currentIndex < episodes.length - 1) {
        loadEpisode(episodes[currentIndex + 1].id);
      }
    }

    function prevEpisode() {
      if (!currentEpisode) return;
      
      const episodes = seasons[currentSeason].episodes;
      const currentIndex = episodes.findIndex(ep => ep.id === currentEpisode);
      
      if (currentIndex > 0) {
        loadEpisode(episodes[currentIndex - 1].id);
      }
    }

    // أحداث النقر
    document.addEventListener("DOMContentLoaded", () => {
      initializeSeasonDropdown();

      const seasonBtn = document.getElementById("seasonBtn");
      const seasonDropdown = document.getElementById("seasonDropdown");

      seasonBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        seasonDropdown.classList.toggle("show");
      });

      window.addEventListener("click", () => {
        seasonDropdown.classList.remove("show");
      });

      document.getElementById("nextEpisodeBtn").addEventListener("click", nextEpisode);
      document.getElementById("prevEpisodeBtn").addEventListener("click", prevEpisode);

      loadSeason(currentSeason);
    });

    // دالة تغيير المستخدم
    function setCurrentUser(userId) {
      // مسح البيانات القديمة من الذاكرة المؤقتة
      currentUserId = userId;
      localStorage.setItem("currentUserId", userId);
      
      // تحميل بيانات المستخدم الجديد
      currentSeason = parseInt(localStorage.getItem(`lastWatchedSeason_${currentUserId}`)) || 1;
      currentEpisode = parseInt(localStorage.getItem(`lastWatchedEpisodeId_${currentUserId}`)) || null;
      
      // إعادة تحميل الصفحة
      loadSeason(currentSeason);
      
      console.log('تم تغيير المستخدم إلى:', userId);
    }

    // دالة تسجيل الخروج
    function logout() {
      setCurrentUser('guest');
    }
  </script>
